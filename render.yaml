services:
  - type: web
    name: gate-signal-automation-26292
    runtime: docker
    plan: starter
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: signal-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8787"
      - key: DRY_RUN
        value: "true"
      - key: AUTO_EXECUTION_ENABLED
        value: "true"
      - key: TELEGRAM_MODE
        value: webhook
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        value: -1003758464445,-1003720685651,-1003093807993,-1003358734784,-1002953601978,-1003435926001,-1003162264989,-1003300637347,-1003044946193,-1003547241758
      - key: TELEGRAM_ANALYST_CHAT_IDS
        value: -1003093807993,-1003358734784,-1002953601978,-1003435926001,-1003162264989,-1003300637347,-1003044946193,-1003547241758
      - key: TELEGRAM_NEWS_CHAT_IDS
        value: -1003758464445,-1003720685651
      - key: TELEGRAM_POLL_TIMEOUT_SEC
        value: "20"
      - key: PLAYBOOKS_FILE
        value: ./config/playbooks.example.json
      - key: DATA_DIR
        value: ./data
      - key: MAX_DAILY_TRADES
        value: "5"
      - key: MAX_DAILY_NOTIONAL_USD
        value: "1000"
      - key: DEDUP_WINDOW_SEC
        value: "1800"
      - key: APPROVAL_SIGNING_SECRET
        generateValue: true
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: ADMIN_ACCESS_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FEISHU_WEBHOOK_URL
        sync: false
